<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<meta name="theme-color" content="#F5EFE3"/>
<meta name="description" content="Al-Qurʾân — Lecture du Coran avec Tajweed, audio, Tafsir et traduction française"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="Al-Qurʾân"/>
<link rel="manifest" href="./manifest.json"/>
<link rel="apple-touch-icon" href="./icons/icon-192.png"/>
<title>Al-Qurʾân — Le Noble Coran</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Scheherazade+New:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#F5EFE3;--bg2:#FDFAF4;--side:#EDE6D5;
  --gold:#8A6910;--gold2:#B8932C;--gf:rgba(138,105,16,.09);--gb:rgba(138,105,16,.22);
  --blue:#1B2D5A;--brown:#3A2008;--bm:#6B4A25;--bl:#9B7A50;
  --border:#DDD1BB;--bstr:#C4B49A;--shadow:rgba(58,32,8,.09);--green:#15803D;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);overflow:hidden;-webkit-font-smoothing:antialiased}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
#root{height:100%;display:flex;flex-direction:column}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--gb);border-radius:2px}

@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes bar1{0%,100%{height:5px}50%{height:17px}}
@keyframes bar2{0%,100%{height:9px}50%{height:21px}}
@keyframes bar3{0%,100%{height:4px}50%{height:13px}}
@keyframes bar4{0%,100%{height:13px}50%{height:7px}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(138,105,16,.3)}70%{box-shadow:0 0 0 10px rgba(138,105,16,0)}}
@keyframes vcheck{0%{opacity:0;transform:scale(.5)}100%{opacity:1;transform:scale(1)}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes obFade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* Tajweed colours (light theme) */
.tw .ham_wasl,.tw .slnt,.tw .laam_shamsiyya{color:#A0A0A0!important}
.tw .madda_necessary{color:#1D4ED8!important;font-weight:700}
.tw .madda_permissible{color:#2563EB!important}
.tw .madda_normal{color:#3B82F6!important}
.tw .madda_obligatory{color:#1E3A8A!important;font-weight:700}
.tw .qalaqah{color:#B45309!important}
.tw .ikhafa_shafawi{color:#9D174D!important}
.tw .ikhafa{color:#6D28D9!important}
.tw .iqlab{color:#0E7490!important}
.tw .idghaam_shafawi{color:#047857!important}
.tw .idghaam_wo_ghunnah{color:#065F46!important}
.tw .idghaam_w_ghunnah{color:#059669!important}
.tw .ghunnah{color:#15803D!important}

/* Transitions */
#content{transition:opacity .17s ease,transform .17s ease}
#content.fading{opacity:0;transform:translateY(5px)}

/* Surah list row */
.sr-row{display:flex;align-items:center;padding:12px 14px;border-bottom:1px solid rgba(221,209,187,.55);cursor:pointer;transition:background .12s;gap:0;}
.sr-row:hover,.sr-row:active{background:rgba(138,105,16,.06)}
.sr-row .sr-num{width:36px;text-align:center;flex-shrink:0;font-size:14px;font-weight:700;color:var(--bl);}
.sr-row .sr-info{flex:1;padding:0 10px;}
.sr-row .sr-en{font-size:14px;font-weight:600;color:var(--brown);}
.sr-row .sr-fr{font-size:11px;color:var(--bl);margin-top:2px;}
.sr-row .sr-ar{font-family:'Scheherazade New',serif;font-size:22px;color:var(--blue);direction:rtl;flex-shrink:0;min-width:65px;text-align:center;}

.verse-word{cursor:pointer;border-radius:3px;transition:background .12s;display:inline;}
.verse-word:hover{background:rgba(138,105,16,.14)}

/* Button reset */
button{cursor:pointer;font-family:inherit;}

/* Splash */
#splash{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .5s;}
#splash.out{opacity:0;pointer-events:none}
.sp-ring{width:130px;height:130px;border-radius:50%;border:1.5px solid var(--gb);display:flex;align-items:center;justify-content:center;margin-bottom:24px;}
.sp-inner{width:100px;height:100px;border-radius:50%;border:1px solid var(--gf);display:flex;align-items:center;justify-content:center;}
.sp-ara{font-family:'Scheherazade New',serif;font-size:38px;color:var(--gold);}
.sp-sub{font-size:11px;color:var(--bl);letter-spacing:2px;text-transform:uppercase;margin-bottom:32px;}
.sp-bar{width:90px;height:2px;background:var(--border);border-radius:1px;overflow:hidden;}
.sp-fill{height:100%;background:var(--gold);width:0;transition:width 1.8s ease;}

/* Toast */
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--brown);color:#FDF8EE;border-radius:20px;padding:7px 18px;font-size:13px;z-index:8000;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;box-shadow:0 4px 20px var(--shadow);}
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div class="sp-ring"><div class="sp-inner"><div class="sp-ara">قرآن</div></div></div>
  <div class="sp-sub">Al-Qurʾân · Lecture & Méditation</div>
  <div class="sp-bar"><div class="sp-fill" id="spf"></div></div>
</div>
<div id="toast"></div>

<!-- APP ROOT -->
<div id="root">

  <!-- ONBOARDING OVERLAY -->
  <div id="onboard" style="display:none;position:fixed;inset:0;z-index:500;background:var(--bg);flex-direction:column;align-items:center;justify-content:center;padding:36px 30px;text-align:center;">
    <div id="ob-icon" style="font-size:60px;margin-bottom:22px;animation:obFade .4s ease;"></div>
    <div id="ob-title" style="font-size:22px;font-weight:700;color:var(--brown);margin-bottom:12px;"></div>
    <div id="ob-body" style="font-size:14px;color:var(--bm);line-height:1.8;margin-bottom:30px;max-width:290px;"></div>
    <div style="display:flex;gap:8px;margin-bottom:28px;" id="ob-dots"></div>
    <button id="ob-btn" onclick="obNext()" style="width:230px;padding:14px;background:var(--gold);border:none;border-radius:14px;color:white;font-size:15px;font-weight:600;letter-spacing:.3px;"></button>
    <button id="ob-skip" onclick="obDone()" style="margin-top:14px;background:none;border:none;color:var(--bl);font-size:13px;">Passer l'introduction</button>
  </div>

  <!-- SURAH INFO MODAL -->
  <div id="info-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.38);z-index:200;align-items:flex-end;">
    <div style="background:var(--bg2);border-radius:20px 20px 0 0;width:100%;animation:slideUp .25s ease;overflow:hidden;max-height:90vh;display:flex;flex-direction:column;">
      <div style="height:4px;background:var(--gold);width:50px;border-radius:2px;margin:14px auto 0;flex-shrink:0;"></div>
      <div style="padding:18px 20px 22px;overflow-y:auto;">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;">
          <div>
            <div id="inf-en" style="font-size:22px;font-weight:700;color:var(--brown);"></div>
            <div id="inf-fr" style="font-size:14px;color:var(--bm);margin-top:3px;"></div>
          </div>
          <div id="inf-ar" style="font-family:'Scheherazade New',serif;font-size:36px;color:var(--blue);direction:rtl;"></div>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;" id="inf-tags"></div>
        <div id="inf-basmala" style="font-family:'Scheherazade New',serif;font-size:22px;color:var(--blue);text-align:center;direction:rtl;padding:14px;background:#F8F3E8;border-radius:10px;margin-bottom:14px;line-height:2;border:1px solid var(--border);"></div>
        <div id="inf-desc" style="font-size:13px;color:var(--bm);line-height:1.8;margin-bottom:20px;"></div>
        <button onclick="startReading()" style="width:100%;padding:14px;background:var(--gold);border:none;border-radius:12px;color:white;font-size:15px;font-weight:600;margin-bottom:8px;">Commencer la lecture →</button>
        <button onclick="document.getElementById('info-modal').style.display='none'" style="width:100%;padding:10px;background:none;border:none;color:var(--bl);font-size:13px;">Annuler</button>
      </div>
    </div>
  </div>

  <!-- TAFSIR MODAL -->
  <div id="taf-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.38);z-index:200;align-items:flex-end;">
    <div style="background:var(--bg2);border-radius:20px 20px 0 0;width:100%;max-height:80vh;display:flex;flex-direction:column;overflow:hidden;animation:slideUp .25s ease;">
      <div style="padding:14px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-shrink:0;">
        <div><div style="font-size:15px;font-weight:700;color:var(--brown);">Tafsir Ibn Kathir</div><div id="taf-ref" style="font-size:11px;color:var(--bl);margin-top:2px;"></div></div>
        <button onclick="document.getElementById('taf-modal').style.display='none'" style="background:none;border:none;font-size:20px;color:var(--bl);">✕</button>
      </div>
      <div id="taf-ara" style="padding:12px 16px;font-family:'Scheherazade New',serif;font-size:24px;color:var(--blue);text-align:right;direction:rtl;line-height:2;background:#F8F3E8;border-bottom:1px solid var(--border);flex-shrink:0;"></div>
      <div id="taf-fr"  style="padding:10px 16px;font-size:13px;color:var(--bm);font-style:italic;line-height:1.7;border-bottom:1px solid var(--border);flex-shrink:0;"></div>
      <div id="taf-body" style="padding:14px 16px;overflow-y:auto;flex:1;font-size:13.5px;line-height:1.9;color:var(--brown);"></div>
    </div>
  </div>

  <!-- WORD POPUP -->
  <div id="word-pop" style="display:none;position:fixed;bottom:120px;left:50%;transform:translateX(-50%);z-index:180;background:var(--bg2);border:1.5px solid var(--gold);border-radius:14px;padding:16px 22px;min-width:220px;box-shadow:0 8px 32px var(--shadow);text-align:center;animation:fadeUp .2s ease;">
    <div id="wp-ara" style="font-family:'Scheherazade New',serif;font-size:28px;color:var(--blue);direction:rtl;margin-bottom:6px;"></div>
    <div id="wp-tr" style="font-size:12px;color:var(--bm);font-style:italic;margin-bottom:4px;"></div>
    <div id="wp-root" style="font-size:11px;color:var(--gold);margin-bottom:12px;"></div>
    <button onclick="document.getElementById('word-pop').style.display='none'" style="background:var(--gold);border:none;border-radius:8px;color:white;padding:6px 20px;font-size:12px;font-weight:600;">Fermer</button>
  </div>

  <!-- HEADER -->
  <header style="background:var(--bg2);border-bottom:1px solid var(--border);padding:11px 13px;display:flex;align-items:center;gap:9px;flex-shrink:0;box-shadow:0 1px 6px var(--shadow);">
    <button onclick="toggleSidebar()" style="border:1px solid var(--border);background:none;border-radius:8px;padding:7px 10px;font-size:14px;color:var(--bm);">☰</button>
    <div id="hdr" style="flex:1;text-align:center;">
      <div style="font-size:17px;font-weight:700;color:var(--blue);">Al-Qurʾân</div>
      <div style="font-size:10px;color:var(--bl);letter-spacing:1.2px;text-transform:uppercase;margin-top:1px;">Lecture & Méditation</div>
    </div>
    <div style="display:flex;gap:6px;">
      <button onclick="switchTab('tools')" style="border:1px solid var(--border);background:none;border-radius:8px;padding:7px 8px;font-size:13px;" title="Dhikr & Outils">🤲</button>
      <button onclick="toggleSettings()" style="border:1px solid var(--border);background:none;border-radius:8px;padding:7px 8px;font-size:13px;" title="Paramètres">⚙️</button>
    </div>
  </header>

  <!-- TAB BAR -->
  <nav style="display:flex;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;">
    <button onclick="switchTab('home')"   id="t-home"   style="flex:1;padding:7px 2px;background:none;font-size:10px;color:var(--gold);border:none;border-top:2px solid var(--gold);line-height:1.4;">🏠<br>Accueil</button>
    <button onclick="switchTab('quran')"  id="t-quran"  style="flex:1;padding:7px 2px;background:none;font-size:10px;color:var(--bl);border:none;border-top:2px solid transparent;line-height:1.4;">📖<br>Lire</button>
    <button onclick="switchTab('search')" id="t-search" style="flex:1;padding:7px 2px;background:none;font-size:10px;color:var(--bl);border:none;border-top:2px solid transparent;line-height:1.4;">🔍<br>Chercher</button>
    <button onclick="switchTab('tools')"  id="t-tools"  style="flex:1;padding:7px 2px;background:none;font-size:10px;color:var(--bl);border:none;border-top:2px solid transparent;line-height:1.4;">✨<br>Outils</button>
    <button onclick="switchTab('bk')"     id="t-bk"     style="flex:1;padding:7px 2px;background:none;font-size:10px;color:var(--bl);border:none;border-top:2px solid transparent;line-height:1.4;position:relative;">🔖<br>Signets
      <span id="bk-n" style="display:none;position:absolute;top:2px;right:3px;background:var(--gold);color:white;font-size:8px;border-radius:6px;padding:1px 4px;"></span>
    </button>
  </nav>

  <!-- SIDEBAR OVERLAY & PANEL -->
  <div id="sb-ov" onclick="closeSB()" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.28);z-index:50;"></div>
  <aside id="sidebar" style="position:fixed;top:0;left:0;height:100%;width:285px;background:var(--side);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:60;transform:translateX(-100%);transition:transform .26s ease;box-shadow:4px 0 24px rgba(0,0,0,.1);">
    <div style="padding:16px 13px 10px;border-bottom:1px solid var(--border);flex-shrink:0;">
      <div style="font-size:16px;font-weight:700;color:var(--brown);margin-bottom:10px;">Liste des sourates</div>
      <div style="display:flex;background:#E0D8C5;border-radius:8px;padding:3px;margin-bottom:8px;">
        <button onclick="setSBM('s')" id="sb-s" style="flex:1;padding:6px;border:none;border-radius:6px;background:var(--gold);color:white;font-size:11px;font-weight:600;">Sourates</button>
        <button onclick="setSBM('j')" id="sb-j" style="flex:1;padding:6px;border:none;border-radius:6px;background:transparent;color:var(--bm);font-size:11px;">Juz</button>
      </div>
      <input id="sb-q" placeholder="Rechercher une sourate…" oninput="buildSB()" style="width:100%;padding:8px 11px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--brown);font-size:12px;outline:none;">
    </div>
    <!-- Sidebar column headers -->
    <div style="display:flex;padding:7px 14px;border-bottom:1px solid var(--border);background:var(--active,#E8E0CE);flex-shrink:0;" id="sb-hdrs">
      <div style="width:36px;font-size:9px;color:var(--bl);font-weight:700;text-transform:uppercase;text-align:center;">N°</div>
      <div style="flex:1;padding:0 10px;font-size:9px;color:var(--bl);font-weight:700;text-transform:uppercase;">Sourate</div>
      <div style="min-width:65px;font-size:9px;color:var(--bl);font-weight:700;text-transform:uppercase;text-align:center;">Arabe</div>
    </div>
    <div id="sb-list" style="flex:1;overflow-y:auto;"></div>
  </aside>

  <!-- SETTINGS PANEL -->
  <div id="s-panel" style="position:fixed;top:0;right:0;height:100%;width:290px;background:var(--bg2);border-left:1px solid var(--border);z-index:60;transform:translateX(100%);transition:transform .26s ease;box-shadow:-4px 0 20px rgba(0,0,0,.08);display:flex;flex-direction:column;">
    <div style="padding:16px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-shrink:0;">
      <div style="font-size:16px;font-weight:700;color:var(--brown);">⚙️ Paramètres</div>
      <button onclick="toggleSettings()" style="background:none;border:none;font-size:18px;color:var(--bl);">✕</button>
    </div>
    <div style="padding:14px;overflow-y:auto;flex:1;">
      <div style="font-size:11px;color:var(--bl);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;">Récitateur</div>
      <div id="rec-list" style="display:flex;flex-direction:column;gap:6px;margin-bottom:16px;"></div>
      <div style="font-size:11px;color:var(--bl);letter-spacing:1px;text-transform:uppercase;margin-bottom:5px;">Taille texte coranique · <span id="fv">32</span>px</div>
      <input type="range" id="fs-range" min="24" max="44" value="32" step="1" oninput="setFS(+this.value)" style="width:100%;accent-color:var(--gold);margin-bottom:16px;">
      <div style="font-size:11px;color:var(--bl);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;">Vitesse de récitation</div>
      <div style="display:flex;gap:5px;margin-bottom:16px;" id="spd-btns"></div>
      <div id="togs" style="border-top:1px solid var(--border);padding-top:2px;"></div>
    </div>
  </div>
  <div id="s-ov" onclick="toggleSettings()" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.18);z-index:59;"></div>

  <!-- MAIN CONTENT -->
  <main id="content" style="flex:1;overflow-y:auto;padding-bottom:112px;"></main>

  <!-- AUDIO PLAYER -->
  <div id="player" style="display:none;position:fixed;bottom:50px;left:0;right:0;background:var(--bg2);border-top:1.5px solid var(--border);box-shadow:0 -2px 16px var(--shadow);">
    <div id="prog-wrap" style="height:3px;background:var(--border);cursor:pointer;" onclick="seekAudio(event)">
      <div id="prog" style="height:100%;background:var(--gold);width:0%;transition:width .35s linear;pointer-events:none;border-radius:0 2px 2px 0;"></div>
    </div>
    <div style="display:flex;align-items:center;gap:10px;padding:8px 14px;">
      <div id="wv" style="display:flex;align-items:center;gap:2px;height:22px;padding:0 3px;flex-shrink:0;">
        <div style="width:3px;height:5px;border-radius:2px;background:var(--gold);opacity:.4;"></div>
        <div style="width:3px;height:9px;border-radius:2px;background:var(--gold);opacity:.4;"></div>
        <div style="width:3px;height:4px;border-radius:2px;background:var(--gold);opacity:.4;"></div>
        <div style="width:3px;height:12px;border-radius:2px;background:var(--gold);opacity:.4;"></div>
      </div>
      <div style="flex:1;min-width:0;">
        <div id="pl-t" style="font-size:13px;font-weight:700;color:var(--brown);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;"></div>
        <div id="pl-s" style="font-size:10px;color:var(--bl);margin-top:1px;"></div>
      </div>
      <button id="b-prev" onclick="audioPrev()" style="background:none;border:none;font-size:20px;color:var(--brown);padding:0;opacity:.4;">⏮</button>
      <button id="b-play" onclick="audioToggle()" style="width:42px;height:42px;border-radius:50%;background:var(--gold);border:none;color:white;font-size:17px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 12px var(--gb);">▶</button>
      <button id="b-next" onclick="audioNext()" style="background:none;border:none;font-size:20px;color:var(--brown);padding:0;">⏭</button>
      <button id="b-rpt"  onclick="cycleRpt()" style="background:none;border:none;font-size:15px;color:var(--bm);opacity:.3;">🔁</button>
    </div>
  </div>

  <!-- BOTTOM NAVIGATION -->
  <nav style="position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);display:flex;height:50px;padding-bottom:env(safe-area-inset-bottom);">
    <button onclick="switchTab('home')"   style="flex:1;background:none;border:none;font-size:9px;color:var(--gold);padding:0;line-height:1.4;">🏠<br>Accueil</button>
    <button onclick="switchTab('quran')"  style="flex:1;background:none;border:none;font-size:9px;color:var(--bl);padding:0;line-height:1.4;">📖<br>Lire</button>
    <button onclick="switchTab('search')" style="flex:1;background:none;border:none;font-size:9px;color:var(--bl);padding:0;line-height:1.4;">🔍<br>Chercher</button>
    <button onclick="switchTab('tools')"  style="flex:1;background:none;border:none;font-size:9px;color:var(--bl);padding:0;line-height:1.4;">✨<br>Outils</button>
    <button onclick="switchTab('bk')"     style="flex:1;background:none;border:none;font-size:9px;color:var(--bl);padding:0;line-height:1.4;">🔖<br>Signets</button>
  </nav>
</div><!-- #root -->

<script>
'use strict';
// ── STATIC DATA ─────────────────────────────────────────────────────────────
// [n, translitération, traduction FR, versets, type(M=Mecquoise/D=Médinoise), arabe]
const SD=[
[1,'Al-Fatihah',"L'Ouverture",7,'M','الفاتحة'],[2,'Al-Baqarah','La Vache',286,'D','البقرة'],
[3,'Ali-Imran',"La Famille d'Imrân",200,'D','آل عمران'],[4,'An-Nisa','Les Femmes',176,'D','النساء'],

// ── AUDIO ──────────────────────────────────────────────────────────────────
const aud=new Audio();
aud.addEventListener('ended',()=>{
  if(S.repeat==='verse'){aud.play();return;}
  S.versesDone.add(S.vi);
  const nx=S.vi+1;
  if(nx<S.ayahs.length)playAt(nx);
  else if(S.repeat==='surah')playAt(0);
  else{S.playing=false;updPlay();}
});
aud.addEventListener('timeupdate',()=>{
  if(aud.duration>0){const p=document.getElementById('prog');if(p)p.style.width=(aud.currentTime/aud.duration*100)+'%';}
});
aud.addEventListener('play', ()=>{S.playing=true;updPlay();wave(true);});
aud.addEventListener('pause',()=>{S.playing=false;updPlay();wave(false);});

function wave(on){
  const bars=document.querySelectorAll('#wv div');
  const an=['bar1 .5s ease infinite','bar2 .4s ease .1s infinite','bar3 .6s ease .05s infinite','bar4 .45s ease .15s infinite'];
  bars.forEach((b,i)=>{b.style.animation=on?an[i]:'none';b.style.opacity=on?'1':'.4';});
  const bp=document.getElementById('b-play');
  if(bp)bp.style.animation=on?'pulse 1.5s ease infinite':'none';
}
function updPlay(){const b=document.getElementById('b-play');if(b)b.textContent=S.playing?'⏸':'▶';}
function haptic(){try{navigator.vibrate&&navigator.vibrate(30);}catch{}}

function seekAudio(e){
  const pw=document.getElementById('prog-wrap');if(!pw)return;
  const r=pw.getBoundingClientRect();
  const pct=Math.max(0,Math.min(1,(e.clientX-r.left)/r.width));
  if(aud.duration)aud.currentTime=pct*aud.duration;
}

let _tt;
function toast(msg,dur=2600){
  const t=document.getElementById('toast');if(!t)return;
  clearTimeout(_tt);t.textContent=msg;t.style.opacity='1';
  _tt=setTimeout(()=>t.style.opacity='0',dur);
}
window.showToast=toast;

function trackVerse(){
  const now=new Date().toDateString();
  const s=S.stats;
  if(s.lastDay!==now){
    if(s.lastDay){
      const yest=new Date(Date.now()-86400000).toDateString();
      if(s.lastDay===yest)s.streak++;else s.streak=1;
    }else s.streak=1;
    s.today=0;s.lastDay=now;
    s.days.push(0);if(s.days.length>7)s.days.shift();
  }
  s.today++;s.week=(s.week||0)+1;s.total=(s.total||0)+1;
  if(s.days.length)s.days[s.days.length-1]++;
  S.stats=s;lss('q_stats',s);
}

  const s=OB[obStep];

  document.getElementById('ob-body').textContent=s.body;
  document.getElementById('ob-btn').textContent=s.btn;
  document.getElementById('ob-skip').style.display=obStep<2?'block':'none';
  document.getElementById('ob-dots').innerHTML=OB.map((_,i)=>
    `<div style="width:${i===obStep?22:8}px;height:8px;border-radius:4px;background:${i===obStep?'var(--gold)':'var(--border)'};transition:all .3s;cursor:pointer;" onclick="obStep=${i};renderOB()"></div>`
  ).join('');
}
function obNext(){if(obStep<OB.length-1){obStep++;renderOB();}else obDone();}
function obDone(){lss('q_ob',true);document.getElementById('onboard').style.display='none';}

  if(S.sbm==='s'){

      <div style="font-size:11px;color:var(--bl);">S.${j.s}</div>

// ── SURAH INFO MODAL ────────────────────────────────────────────────────────
function openSurahInfo(n){
  const s=SD.find(x=>x[0]===n);if(!s)return;haptic();
  const [,en,fr,v,type,ar]=s;
  const icon=type==='M'?'🕋':'🕌';
  const typeFr=type==='M'?'Mecquoise':'Médinoise';
  document.getElementById('inf-en').textContent=en;
  document.getElementById('inf-fr').textContent=fr;
  document.getElementById('inf-ar').textContent=ar;
  document.getElementById('inf-tags').innerHTML=
    `<span style="padding:4px 11px;border-radius:20px;font-size:11px;background:var(--gf);border:1px solid var(--gb);color:var(--gold);font-weight:600;">${icon} ${typeFr}</span>`+
    `<span style="padding:4px 11px;border-radius:20px;font-size:11px;background:var(--gf);border:1px solid var(--border);color:var(--bm);">${v} versets</span>`+
    `<span style="padding:4px 11px;border-radius:20px;font-size:11px;background:var(--gf);border:1px solid var(--border);color:var(--bm);">Sourate ${n} / 114</span>`;
  document.getElementById('inf-basmala').textContent=n===9?'(Pas de Basmala pour At-Tawbah)':'بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ';
  document.getElementById('inf-desc').textContent=SURAH_DESCS[n]||`Sourate ${en} (${fr}) — ${typeFr}, ${v} versets. Cliquez sur "Commencer la lecture" pour accéder au texte complet avec traduction et audio.`;
  S.sInfoPending=n;
  document.getElementById('info-modal').style.display='flex';
}
function startReading(){
  document.getElementById('info-modal').style.display='none';
  if(S.sInfoPending!=null){navTo(S.sInfoPending);S.sInfoPending=null;}
}

// ── NAVIGATION & LOADING ────────────────────────────────────────────────────
function navTo(n){
  closeSB();S.sn=n;loadSurah(n);switchTab('quran');
}

function loadSurah(n){
  S.loading=true;S.ayahs=[];S.frV=[];S.vi=0;
  S.versesDone=new Set();S.revWords=new Set();
  aud.src='';S.playing=false;wave(false);updPlay();render();
  lss('q_last',{sn:n,vi:0});

  fetch(`https://api.alquran.cloud/v1/surah/${n}/editions/quran-uthmani,fr.hamidullah`)
    .then(r=>r.json())
    .then(({code,data})=>{
      if(code===200&&Array.isArray(data)&&data.length>=2){
        S.ayahs=data[0].ayahs||[];
        S.frV=data[1].ayahs||[];
      }
      S.loading=false;
      updateHeaderForSurah(n);
      render();
    })
    .catch(()=>{S.loading=false;render();});

  // Background load of full Coran for global search
  if(!S.allFr&&!S.allFrLoading){
    S.allFrLoading=true;
    fetch('https://api.alquran.cloud/v1/quran/fr.hamidullah')
      .then(r=>r.json())
      .then(({code,data})=>{
        if(code===200&&data?.surahs){
          const all=[];
          data.surahs.forEach(s=>s.ayahs.forEach(a=>all.push({...a,surah:s.number})));
          S.allFr=all;
          if(S.tab==='search')render();
        }
        S.allFrLoading=false;
      })
      .catch(()=>{S.allFrLoading=false;});
  }
}

function updateHeaderForSurah(n){
  const s=SD.find(x=>x[0]===n);
  const hdr=document.getElementById('hdr');
  if(!hdr||!s)return;
  const icon=s[4]==='M'?'🕋':'🕌';
  hdr.innerHTML=`<div style="font-size:16px;font-weight:700;color:var(--brown);">${s[1]} <span style="font-weight:400;font-size:13px;color:var(--bl);">(${s[2]})</span></div><div style="font-size:10px;color:var(--bl);letter-spacing:1px;text-transform:uppercase;margin-top:1px;">${icon} ${s[4]==='M'?'Mecquoise':'Médinoise'} · ${s[3]} versets</div>`;
}

function aURL(n,i){
  const o=OFFSETS[n];if(!o)return null;
  return `https://cdn.islamic.network/quran/audio/128/${S.rec}/${o+i}.mp3`;
}

function playAt(idx){
  if(idx<0||idx>=S.ayahs.length)return;
  S.vi=idx;haptic();
  const url=aURL(S.sn,idx);
  if(url){aud.src=url;aud.playbackRate=S.spd;aud.play().catch(()=>{});}
  updPlayer();trackVerse();
  lss('q_last',{sn:S.sn,vi:idx});
  render();
  setTimeout(()=>{
    const el=document.querySelector(`[data-vi="${idx}"]`);
    el?.scrollIntoView({behavior:'smooth',block:'center'});
  },80);
}

function audioToggle(){
  if(S.playing)aud.pause();
  else{if(aud.src)aud.play().catch(()=>{});else playAt(S.vi);}
}
function audioPrev(){if(S.vi>0)playAt(S.vi-1);}
function audioNext(){if(S.vi<S.ayahs.length-1)playAt(S.vi+1);}
function cycleRpt(){
  S.repeat=S.repeat==='none'?'verse':S.repeat==='verse'?'surah':'none';
  const b=document.getElementById('b-rpt');if(!b)return;
  b.style.opacity=S.repeat==='none'?'.3':'1';
  b.textContent=S.repeat==='verse'?'🔂':'🔁';
}

function updPlayer(){
  const pl=document.getElementById('player');if(!pl)return;
  if(S.tab==='quran'&&S.ayahs.length){
    pl.style.display='block';
    const s=SD.find(x=>x[0]===S.sn);
    document.getElementById('pl-t').textContent=s?`${s[1]} — ${s[2]}`:'';
    document.getElementById('pl-s').textContent=`Verset ${S.vi+1} sur ${S.ayahs.length} · ${s?.[4]==='M'?'Mecquoise 🕋':'Médinoise 🕌'}`;
    document.getElementById('b-prev').style.opacity=S.vi===0?'.4':'1';
    document.getElementById('b-next').style.opacity=S.vi>=S.ayahs.length-1?'.4':'1';
  }else pl.style.display='none';
}

// ── BOOKMARKS ─────────────────────────────────────────────────────────────
function toggleBk(sn,idx,e){
  e&&e.stopPropagation();haptic();
  const key=`${sn}:${idx+1}`;
  const s=SD.find(x=>x[0]===sn);
  const ex=S.bk.some(b=>b.key===key);
  if(ex)S.bk=S.bk.filter(b=>b.key!==key);
  else S.bk.push({key,sn,vi:idx,en:s?.[1]||'',fr:s?.[2]||'',frPrev:(S.frV[idx]?.text||'').slice(0,100)});
  lss('q_bk',S.bk);
  updBadge();
  toast(ex?'Signet retiré':'🔖 Signet ajouté');
  render();
}
function rmBk(key,e){e&&e.stopPropagation();S.bk=S.bk.filter(b=>b.key!==key);lss('q_bk',S.bk);updBadge();render();}
function updBadge(){const n=document.getElementById('bk-n');if(n){n.textContent=S.bk.length;n.style.display=S.bk.length?'inline':'none';}}

// ── TAFSIR ────────────────────────────────────────────────────────────────
function openTafsir(idx,e){
  e&&e.stopPropagation();haptic();
  const ay=S.ayahs[idx];const fr=S.frV[idx];const s=SD.find(x=>x[0]===S.sn);
  document.getElementById('taf-ref').textContent=`${s?.[1]||''} · Verset ${idx+1}`;
  document.getElementById('taf-ara').textContent=ay?.text||'';
  document.getElementById('taf-fr').textContent=fr?.text||'';
  document.getElementById('taf-body').innerHTML='<div style="text-align:center;padding:24px;"><div style="width:24px;height:24px;border:2px solid var(--border);border-top:2px solid var(--gold);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 12px;"></div><div style="font-size:12px;color:var(--bl);">Chargement…</div></div>';
  document.getElementById('taf-modal').style.display='flex';
  fetch(`https://api.alquran.cloud/v1/ayah/${S.sn}:${idx+1}/editions/en.ibnkathir`)
    .then(r=>r.json())
    .then(({code,data})=>{
      const text=code===200&&Array.isArray(data)?data[0]?.text:null;
      document.getElementById('taf-body').innerHTML=text?
        `<div style="font-size:11px;color:var(--bl);padding:7px 11px;background:#FFFBEE;border-radius:7px;margin-bottom:14px;border:1px solid var(--border);">📘 Tafsir Ibn Kathir · Version anglaise (intégration française en cours)</div><div style="font-size:13.5px;line-height:1.95;">${text}</div>`:
        '<div style="text-align:center;padding:32px;color:var(--bl);">Tafsir non disponible pour ce verset.</div>';
    })
    .catch(()=>{document.getElementById('taf-body').innerHTML='<div style="text-align:center;padding:32px;color:var(--bl);">Erreur de connexion</div>';});
}

// ── WORD POPUP ────────────────────────────────────────────────────────────
function showWord(w,e){
  e&&e.stopPropagation();haptic();
  if(S.hz){
    S.revWords.add(w);
    document.querySelectorAll(`.verse-word[data-w="${CSS.escape(w)}"]`).forEach(el=>{el.style.filter='none';});
    return;
  }
  document.getElementById('wp-ara').textContent=w;
  document.getElementById('wp-tr').textContent='Appuyez sur ce mot dans l\'application pour voir sa traduction et racine';
  document.getElementById('wp-root').textContent='';
  document.getElementById('word-pop').style.display='block';
}

// ── TAB SWITCH ────────────────────────────────────────────────────────────
function switchTab(t){
  const c=document.getElementById('content');
  c.classList.add('fading');
  setTimeout(()=>{
    S.tab=t;
    ['home','quran','search','tools','bk'].forEach(id=>{
      const el=document.getElementById('t-'+id);if(!el)return;
      const ac=id===t;
      el.style.color=ac?'var(--gold)':'var(--bl)';
      el.style.borderTop=ac?'2px solid var(--gold)':'2px solid transparent';
    });
    const hdr=document.getElementById('hdr');
    if((t!=='quran'||!S.ayahs.length)&&hdr){
      hdr.innerHTML='<div style="font-size:17px;font-weight:700;color:var(--blue);">Al-Qurʾân</div><div style="font-size:10px;color:var(--bl);letter-spacing:1.2px;text-transform:uppercase;margin-top:1px;">Lecture & Méditation</div>';
    }else if(S.ayahs.length&&hdr) updateHeaderForSurah(S.sn);
    render();
    c.classList.remove('fading');
  },140);
}

          <button onclick="toggleBk(${S.sn},${idx},event)" style="background:none;border:none;font-size:16px;opacity:${bkd?1:.25};color:var(--gold);">🔖</button>
          <button onclick="event.stopPropagation();playAt(${idx})" style="width:30px;height:30px;border-radius:50%;background:${ac&&S.playing?'var(--gold)':'var(--gf)'};color:${ac&&S.playing?'white':'var(--gold)'};border:none;font-size:12px;display:flex;align-items:center;justify-content:center;${ac&&S.playing?'animation:pulse 1.5s ease infinite;':''}">${ac&&S.playing?'⏸':'▶'}</button>
        </div>
        <div dir="rtl" style="font-family:'Scheherazade New',serif;font-size:${S.fs}px;line-height:2.2;color:var(--blue);text-align:right;${S.showFr&&fr?'margin-bottom:13px;':''}">${arabicHtml}</div>
        ${S.showFr&&fr?`<div style="font-size:14px;color:var(--bm);line-height:1.82;border-top:1px solid var(--border);padding-top:10px;font-style:italic;">${fr.text}</div>`:''}
      </div>`;
    }).join('');

  // ─ SEARCH ─
  }else if(S.tab==='search'){
    const ready=!!S.allFr;
    c.innerHTML=`<div style="padding:14px;">
      <div style="font-size:13px;color:var(--bl);margin-bottom:10px;">${ready?'Recherche dans les <strong>6 236 versets</strong> du Coran':'Chargement du Coran en arrière-plan…'}</div>
      ${!ready?`<div style="padding:8px 12px;background:#FFFBEE;border:1px solid var(--border);border-radius:8px;font-size:12px;color:var(--bm);margin-bottom:10px;display:flex;align-items:center;gap:8px;"><span style="animation:spin 1s linear infinite;display:inline-block;">⏳</span> Chargement en cours — lancez une recherche après quelques secondes</div>`:''}
      <div style="display:flex;gap:8px;margin-bottom:14px;">
        <input id="sq" placeholder="Ex: miséricordieux, paradis, patience…" style="flex:1;padding:11px 13px;background:var(--bg2);border:1.5px solid var(--border);border-radius:10px;color:var(--brown);font-size:13px;outline:none;" onkeydown="if(event.key==='Enter')doSearch()">
        <button onclick="doSearch()" style="padding:11px 18px;background:var(--gold);border:none;border-radius:10px;color:white;font-size:14px;font-weight:700;">→</button>
      </div>
      <div id="sr"></div>
    </div>`;

  // ─ TOOLS ─
  }else if(S.tab==='tools'){
    const dayIdx=new Date().getDate()%30;
    c.innerHTML=`<div style="padding:14px;">
      <div style="font-size:14px;font-weight:700;color:var(--brown);margin-bottom:12px;">🤲 Compteur de Dhikr</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:22px;">
        ${DHIKR_DATA.map(([fr2,desc,col,t],i)=>{
          const p=Math.min(dc[i]/t,1);
          return `<div style="background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:14px 11px;text-align:center;">
            <div style="font-size:13px;font-weight:700;color:${col};margin-bottom:3px;">${fr2}</div>
            <div style="font-size:10px;color:var(--bl);margin-bottom:9px;">${desc}</div>
            <div style="height:4px;background:var(--border);border-radius:2px;margin-bottom:9px;overflow:hidden;"><div style="height:100%;background:${col};width:${p*100}%;transition:width .3s;"></div></div>
            <div style="font-size:22px;font-weight:700;color:${col};margin-bottom:8px;">${dc[i]}<span style="font-size:11px;color:var(--bl);font-weight:400;">/${t}</span></div>
            <div style="display:flex;gap:5px;justify-content:center;">
              <button onclick="dc[${i}]=Math.max(0,dc[${i}]-1);haptic();render()" style="width:29px;height:29px;border:1px solid var(--border);border-radius:50%;background:none;font-size:15px;color:var(--bl);">−</button>
              <button onclick="dc[${i}]=Math.min(dc[${i}]+1,${t});haptic();render()" style="width:29px;height:29px;background:${col};border:none;border-radius:50%;font-size:15px;color:white;font-weight:700;">+</button>
              <button onclick="dc[${i}]=0;render()" style="width:29px;height:29px;border:1px solid var(--border);border-radius:50%;background:none;font-size:10px;color:var(--bl);">↺</button>
            </div>
            ${dc[i]>=t?`<div style="font-size:11px;color:var(--green);margin-top:6px;font-weight:700;">✓ Complété !</div>`:''}
          </div>`;
        }).join('')}
      </div>
      <div style="font-size:14px;font-weight:700;color:var(--brown);margin-bottom:10px;">📅 Plan Khatma — 30 jours</div>
      <div style="background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:18px;">
        <div style="padding:11px 14px;border-bottom:1px solid var(--border);font-size:12px;color:var(--bl);">
          Aujourd'hui · Jour <strong style="color:var(--brown);">${dayIdx+1}</strong> : ${PLAN30[dayIdx]}
        </div>
        ${PLAN30.map((p,i)=>{const done=i<dayIdx;const cur=i===dayIdx;return `<div style="padding:9px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(221,209,187,.4);background:${cur?'var(--gf)':'transparent'};">
          <div style="width:22px;height:22px;border-radius:50%;background:${done?'var(--green)':cur?'var(--gold)':'#E4D9C4'};color:${done||cur?'white':'var(--bl)'};display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0;">${done?'✓':i+1}</div>
          <div style="flex:1;font-size:12px;color:${cur?'var(--brown)':'var(--bl)'};">${p}</div>
          ${cur?`<div style="font-size:10px;color:var(--gold);font-weight:700;">Auj.</div>`:''}
        </div>`;}).join('')}
      </div>
    </div>`;

  // ─ BOOKMARKS ─
  }else if(S.tab==='bk'){
    if(!S.bk.length){
      c.innerHTML='<div style="text-align:center;padding:72px 20px;"><div style="font-size:50px;margin-bottom:14px;">🔖</div><div style="font-size:18px;color:var(--brown);font-weight:700;margin-bottom:8px;">Aucun signet</div><div style="font-size:14px;color:var(--bl);">Appuyez sur 🔖 dans un verset pour le sauvegarder</div></div>';
    }else{
      c.innerHTML=`<div style="padding:12px;"><div style="font-size:12px;color:var(--bl);margin-bottom:12px;">${S.bk.length} signet(s) enregistré(s) sur cet appareil</div>${S.bk.map(b=>`<div onclick="navTo(${b.sn})" style="padding:14px;margin-bottom:9px;background:var(--bg2);border:1.5px solid var(--border);border-left:4px solid var(--gold);border-radius:12px;cursor:pointer;box-shadow:0 1px 4px var(--shadow);">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;">
          <div><div style="font-size:13px;font-weight:700;color:var(--gold);">${b.en} — Verset ${b.vi+1}</div><div style="font-size:11px;color:var(--bl);margin-top:2px;">${b.fr}</div></div>
          <button onclick="rmBk('${b.key}',event)" style="border:1px solid #FECACA;border-radius:6px;color:#DC2626;padding:3px 9px;font-size:11px;background:none;flex-shrink:0;margin-left:8px;">Retirer</button>
        </div>
        <div style="font-size:13px;color:var(--bl);font-style:italic;line-height:1.65;">${b.frPrev}…</div>
      </div>`).join('')}</div>`;
    }
  }
  updBadge();
}

// ── SEARCH ────────────────────────────────────────────────────────────────
function doSearch(){
  const q=(document.getElementById('sq')?.value||'').toLowerCase().trim();
  const sr=document.getElementById('sr');if(!q||!sr)return;
  const src=S.allFr||(S.frV.map((v,i)=>({...v,surah:S.sn})));
  const res=src.filter(v=>v.text.toLowerCase().includes(q)).slice(0,100);
  if(!res.length){sr.innerHTML='<div style="color:var(--bl);font-size:13px;text-align:center;padding:24px;">Aucun résultat trouvé</div>';return;}
  sr.innerHTML=`<div style="font-size:12px;color:var(--bl);margin-bottom:10px;">${res.length} résultat(s)${S.allFr?' dans tout le Coran':' dans la sourate chargée'}</div>`+
    res.map(v=>{
      const s=SD.find(x=>x[0]===v.surah);
      return `<div onclick="navTo(${v.surah});setTimeout(()=>playAt(${(v.numberInSurah||1)-1}),600)" style="padding:11px 13px;margin-bottom:7px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;cursor:pointer;box-shadow:0 1px 3px var(--shadow);">
        <div style="display:flex;justify-content:space-between;margin-bottom:5px;">
          <div style="font-size:11px;color:var(--gold);font-weight:700;">${s?.[1]||''} — V.${v.numberInSurah}</div>
          <div style="font-family:'Scheherazade New',serif;font-size:14px;color:var(--blue);direction:rtl;">${s?.[5]||''}</div>
        </div>
        <div style="font-size:13px;color:var(--bm);line-height:1.75;font-style:italic;">${v.text.replace(new RegExp(q,'gi'),m=>`<mark style="background:#FFF3C4;color:var(--gold);border-radius:2px;padding:0 1px;">${m}</mark>`)}</div>
      </div>`;
    }).join('');
}

// ── INIT ──────────────────────────────────────────────────────────────────
// Splash
requestAnimationFrame(()=>{const f=document.getElementById('spf');if(f)f.style.width='100%';});
setTimeout(()=>{
  const s=document.getElementById('splash');if(s){s.classList.add('out');setTimeout(()=>s.remove(),600);}
  initOB();
  updBadge();
  render();
  navTo(1);
},2100);

// Service Worker
if('serviceWorker'in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  });
}

// PWA install banner
let dip=null;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();dip=e;});
window.__installApp=async()=>{if(!dip)return;dip.prompt();const{outcome}=await dip.userChoice;dip=null;if(outcome==='accepted')toast('✅ Application installée !');};
</script>
</body>
</html>
