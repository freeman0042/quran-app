  { n:6, cat:"Al-Ikhlâs", reps:3,

            {item.note&&<div style={{fontSize:10,color:'#9D174D',marginTop:2}}>⚠️ {item.note}</div>}

        </div>
        <div style={{display:'flex',alignItems:'center',gap:8,flexShrink:0}}>
          {item.reps>1&&<div style={{background:C.gf,border:`1px solid ${C.gb}`,borderRadius:12,padding:'2px 8px',fontSize:11,color:C.gold,fontWeight:700}}>×{item.reps}</div>}

        </div>
      </div>
      {open&&(
        <div style={{padding:'0 14px 14px',animation:'slideDown .2s ease'}}>
          <div style={{background:'#FAF6EC',borderRadius:10,padding:'16px 14px',marginBottom:(showPh||showFr)?12:0,border:`1px solid ${C.border}`}}>
            <div dir="rtl" style={{fontFamily:ARA,fontSize:26,color:C.blue,textAlign:'right',lineHeight:2.2}}>{item.ar}</div>
          </div>
          {showPh&&(
            <div style={{padding:'10px 12px',background:'rgba(27,45,90,.04)',borderRadius:8,border:`1px solid ${C.border}`,marginBottom:showFr?10:0}}>
              <div style={{fontSize:10,color:C.gold,fontWeight:700,letterSpacing:1,textTransform:'uppercase',marginBottom:6}}>Phonétique</div>
              <div style={{fontSize:13,color:C.blue,lineHeight:1.75,fontStyle:'italic'}}>{item.ph}</div>

            <div style={{padding:'10px 12px',background:C.gf,borderRadius:8,border:`1px solid ${C.gb}`}}>
              <div style={{fontSize:10,color:C.gold,fontWeight:700,letterSpacing:1,textTransform:'uppercase',marginBottom:6}}>Traduction française</div>
              <div style={{fontSize:13,color:C.bm,lineHeight:1.8,fontStyle:'italic'}}>{item.fr}</div>
            </div>
          )}
        </div>
      )}
    </div>
  );
};

const MathuratReader=({showPh,showFr,onBack})=>{
  const [idx,setIdx]=useState(-1); // -1 = intro page
  const item=idx>=0?MATH[idx]:null;
  const total=MATH.length;
  const goNext=()=>setIdx(i=>Math.min(i+1,total-1));
  const goPrev=()=>setIdx(i=>Math.max(i-1,-1));

  // Touch/swipe support
  const touchX=useRef(null);
  const onTouchStart=e=>{touchX.current=e.touches[0].clientX;};
  const onTouchEnd=e=>{
    if(touchX.current===null)return;
    const dx=touchX.current-e.changedTouches[0].clientX;
    if(Math.abs(dx)>50){if(dx>0)goNext();else goPrev();}
    touchX.current=null;
  };

  return(
    <div style={{display:'flex',flexDirection:'column',flex:1,minHeight:0}} onTouchStart={onTouchStart} onTouchEnd={onTouchEnd}>
      {/* Top bar */}
      <div style={{padding:'10px 14px',borderBottom:`1px solid ${C.border}`,background:C.bg2,flexShrink:0,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <button onClick={onBack} style={{background:'none',border:'none',color:C.bm,fontSize:13,cursor:'pointer',padding:'4px 8px',borderRadius:6,display:'flex',alignItems:'center',gap:5}}>
          ← Retour
        </button>
        <div style={{fontSize:13,fontWeight:700,color:C.brown}}>{idx===-1?'Introduction':`${idx+1} / ${total}`}</div>
        <div style={{display:'flex',gap:6,alignItems:'center'}}>
          <div style={{fontSize:10,color:showPh?C.gold:C.bl}}>Ph</div>
          <div style={{fontSize:10,color:showFr?C.gold:C.bl}}>FR</div>
        </div>
      </div>

      {/* Progress bar */}
      {idx>=0&&<div style={{height:2,background:C.border,flexShrink:0}}>
        <div style={{height:'100%',background:C.gold,width:`${((idx+1)/total)*100}%`,transition:'width .3s ease',borderRadius:'0 2px 2px 0'}}/>
      </div>}

      {/* Content */}
      <div style={{flex:1,overflowY:'auto',padding:'20px 16px 16px'}}>
        {idx===-1?(
          /* INTRO PAGE */
          <div style={{animation:'fadeUp .3s ease'}}>
            <div style={{textAlign:'center',marginBottom:20}}>
              <div style={{fontFamily:ARA,fontSize:32,color:C.blue,direction:'rtl',marginBottom:8,lineHeight:1.8}}>الْمَأْثُورَاتُ</div>
              <div style={{fontSize:18,fontWeight:700,color:C.brown,marginBottom:4}}>Al-Ma'thurât Sughrâ</div>
              <div style={{fontSize:12,color:C.bl}}>{total} invocations · Matin & Soir</div>
            </div>
            <div style={{background:'#FAF6EC',border:`1px solid ${C.border}`,borderRadius:14,padding:18,lineHeight:1.85,fontSize:13.5,color:C.bm}}>
              <p style={{marginBottom:14}}>Al-Ma'thurat est un recueil d'invocations authentiques issues du Coran et de la Sunna. Il réunit des adhkâr soigneusement transmis, à réciter quotidiennement, en particulier le matin et le soir, afin de garder le cœur attaché au rappel d'Allah.</p>
              <p style={{marginBottom:14}}>Sa récitation régulière est une source de grands bienfaits : elle fortifie la foi, apaise le cœur, protège le croyant et l'aide à traverser sa journée avec plus de sérénité, de confiance et de présence spirituelle.</p>
              <p>Faire de Al-Ma'thurat une habitude quotidienne, c'est offrir à son âme un rendez-vous constant avec Allah : un moment simple, profond et précieux, qui illumine la journée et nourrit la constance dans l'adoration.</p>
            </div>
            <button onClick={goNext} style={{display:'block',width:'100%',marginTop:20,padding:'14px',background:C.gold,border:'none',borderRadius:12,color:'white',fontSize:15,fontWeight:700,cursor:'pointer',letterSpacing:.3}}>
              Commencer →
            </button>
          </div>
        ):(
          /* INVOCATION PAGE */
          <div style={{animation:'fadeUp .25s ease'}}>
            {/* Category label */}
            <div style={{textAlign:'center',marginBottom:16}}>
              <span style={{background:C.gf,border:`1px solid ${C.gb}`,borderRadius:20,padding:'4px 14px',fontSize:12,color:C.gold,fontWeight:700}}>
                {item.cat}
              </span>
              {item.reps>1&&<span style={{marginLeft:8,background:'#F0E8D0',border:`1px solid ${C.border}`,borderRadius:20,padding:'4px 10px',fontSize:11,color:C.bm}}>× {item.reps} fois</span>}
              {item.note&&<div style={{marginTop:8,fontSize:11,color:'#9D174D',fontWeight:600}}>⚠️ {item.note}</div>}
            </div>

            {/* Arabic text */}
            <div style={{background:'#FAF6EC',border:`1px solid ${C.border}`,borderRadius:14,padding:'20px 16px',marginBottom:14,boxShadow:`0 2px 12px ${C.shadow}`}}>
              <div dir="rtl" style={{fontFamily:ARA,fontSize:26,color:C.blue,textAlign:'right',lineHeight:2.3,direction:'rtl'}}>
                {item.ar}
              </div>
            </div>

            {/* Phonetic */}
            {showPh&&(
              <div style={{background:'rgba(27,45,90,.04)',border:`1px solid ${C.border}`,borderRadius:12,padding:'14px 16px',marginBottom:12,animation:'fadeUp .2s ease'}}>
                <div style={{fontSize:10,color:C.gold,fontWeight:700,letterSpacing:1.5,textTransform:'uppercase',marginBottom:8}}>Phonétique</div>
                <div style={{fontSize:14,color:C.blue,lineHeight:1.85,fontStyle:'italic'}}>{item.ph}</div>
              </div>
            )}

            {/* French translation */}
            {showFr&&(
              <div style={{background:C.gf,border:`1px solid ${C.gb}`,borderRadius:12,padding:'14px 16px',animation:'fadeUp .2s ease'}}>
                <div style={{fontSize:10,color:C.gold,fontWeight:700,letterSpacing:1.5,textTransform:'uppercase',marginBottom:8}}>Traduction française</div>
                <div style={{fontSize:14,color:C.bm,lineHeight:1.85,fontStyle:'italic'}}>{item.fr}</div>
              </div>
            )}
          </div>
        )}
      </div>

      {/* Navigation */}
      <div style={{padding:'12px 16px',borderTop:`1px solid ${C.border}`,background:C.bg2,flexShrink:0,display:'flex',alignItems:'center',gap:12}}>
        <button onClick={goPrev} disabled={idx===-1} style={{width:44,height:44,borderRadius:'50%',border:`1.5px solid ${idx===-1?C.border:C.gold}`,background:idx===-1?'none':C.gf,color:idx===-1?C.border:C.gold,fontSize:18,cursor:idx===-1?'not-allowed':'pointer',display:'flex',alignItems:'center',justifyContent:'center',transition:'all .2s'}}>‹</button>

        {/* Dot indicators (compact) */}
        <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',gap:4,overflowX:'hidden'}}>
          {idx===-1?(
            <div style={{fontSize:12,color:C.bl}}>Glissez ou utilisez les flèches</div>
          ):(
            <>
              <div style={{fontSize:12,color:C.bl,marginRight:6}}>{idx+1}</div>
              <div style={{flex:1,height:4,background:C.border,borderRadius:2,overflow:'hidden',maxWidth:200}}>
                <div style={{height:'100%',background:C.gold,width:`${((idx+1)/total)*100}%`,transition:'width .3s ease'}}/>
              </div>
              <div style={{fontSize:12,color:C.bl,marginLeft:6}}>{total}</div>
            </>
          )}
        </div>

        <button onClick={goNext} disabled={idx===total-1} style={{width:44,height:44,borderRadius:'50%',border:`1.5px solid ${idx===total-1?C.border:C.gold}`,background:idx===total-1?'none':C.gold,color:idx===total-1?C.border:'white',fontSize:18,cursor:idx===total-1?'not-allowed':'pointer',display:'flex',alignItems:'center',justifyContent:'center',transition:'all .2s',boxShadow:idx===total-1?'none':`0 2px 10px ${C.gb}`}}>›</button>
      </div>
    </div>
  );
};

/* ── DHIKR TAB ── */
const DhikrTab=({dc,setDc})=>{
  const [sub,setSub]=useState('counter');
  const [showPh,setSP]=useState(false);
  const [showFr,setSF]=useState(true);
  const [reading,setReading]=useState(false);

  if(sub==='math'&&reading){
    return <MathuratReader showPh={showPh} showFr={showFr} onBack={()=>setReading(false)}/>;
  }

  return(
    <div style={{display:'flex',flexDirection:'column',flex:1,minHeight:0}}>
      <div style={{display:'flex',background:C.bg2,borderBottom:`1px solid ${C.border}`,flexShrink:0}}>
        <button className={`dsub ${sub==='counter'?'on':'off'}`} onClick={()=>setSub('counter')}>📿 Compteur</button>
        <button className={`dsub ${sub==='math'?'on':'off'}`} onClick={()=>setSub('math')}>🌙 Al-Ma'thurât</button>
      </div>

      {sub==='counter'&&(
        <div style={{padding:14,overflowY:'auto',flex:1}}>
          <div style={{fontSize:12,color:C.bl,marginBottom:14,lineHeight:1.7}}>Compteur de tasbih pour vos formules de dhikr après la prière ou à tout moment.</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            {DHIKR.map(([name,desc,col,t],i)=>{const p=Math.min(dc[i]/t,1);return(
              <div key={name} style={{background:C.bg2,border:`1px solid ${C.border}`,borderRadius:14,padding:'14px 11px',textAlign:'center'}}>
                <div style={{fontSize:14,fontWeight:700,color:col,marginBottom:3}}>{name}</div>
                <div style={{fontSize:10,color:C.bl,marginBottom:9}}>{desc}</div>
                <div style={{height:4,background:C.border,borderRadius:2,marginBottom:9,overflow:'hidden'}}><div style={{height:'100%',background:col,width:`${p*100}%`,transition:'width .3s'}}/></div>
                <div style={{fontSize:24,fontWeight:700,color:col,marginBottom:8}}>{dc[i]}<span style={{fontSize:12,color:C.bl,fontWeight:400}}>/{t}</span></div>
                <div style={{display:'flex',gap:5,justifyContent:'center'}}>
                  <button onClick={()=>setDc(prev=>{const n=[...prev];n[i]=Math.max(0,n[i]-1);return n;})} style={{width:30,height:30,border:`1px solid ${C.border}`,borderRadius:'50%',background:'none',fontSize:16,color:C.bl,cursor:'pointer'}}>−</button>
                  <button onClick={()=>setDc(prev=>{const n=[...prev];n[i]=Math.min(n[i]+1,t);return n;})} style={{width:30,height:30,background:col,border:'none',borderRadius:'50%',fontSize:16,color:'white',fontWeight:700,cursor:'pointer'}}>+</button>
                  <button onClick={()=>setDc(prev=>{const n=[...prev];n[i]=0;return n;})} style={{width:30,height:30,border:`1px solid ${C.border}`,borderRadius:'50%',background:'none',fontSize:11,color:C.bl,cursor:'pointer'}}>↺</button>
                </div>
                {dc[i]>=t&&<div style={{fontSize:11,color:C.green,marginTop:5,fontWeight:700}}>✓ Complété !</div>}
              </div>
            );})}
          </div>
        </div>
      )}

      {sub==='math'&&(
        <div style={{flex:1,overflowY:'auto',padding:16}}>
          {/* Options */}
          <div style={{display:'flex',gap:8,marginBottom:16}}>
            <div style={{display:'flex',alignItems:'center',gap:7,padding:'7px 13px',background:showPh?C.gf:C.bg2,border:`1px solid ${showPh?C.gold:C.border}`,borderRadius:20,cursor:'pointer',flex:1,justifyContent:'center'}} onClick={()=>setSP(v=>!v)}>
              <Toggle on={showPh} onToggle={()=>setSP(v=>!v)}/>
              <span style={{fontSize:12,color:showPh?C.gold:C.bm,fontWeight:showPh?600:400}}>Phonétique</span>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:7,padding:'7px 13px',background:showFr?C.gf:C.bg2,border:`1px solid ${showFr?C.gold:C.border}`,borderRadius:20,cursor:'pointer',flex:1,justifyContent:'center'}} onClick={()=>setSF(v=>!v)}>
              <Toggle on={showFr} onToggle={()=>setSF(v=>!v)}/>
              <span style={{fontSize:12,color:showFr?C.gold:C.bm,fontWeight:showFr?600:400}}>Traduction 🇫🇷</span>
            </div>
          </div>

          {/* Entry card */}
          <div style={{background:'linear-gradient(135deg,#2A1F0A,#1B2D5A)',borderRadius:16,padding:'24px 20px',marginBottom:16,textAlign:'center',position:'relative',overflow:'hidden'}}>
            <div style={{position:'absolute',inset:0,opacity:.06,backgroundImage:'repeating-linear-gradient(60deg,#c9a84c 0,#c9a84c 1px,transparent 0,transparent 18px)',backgroundSize:'18px 18px'}}/>
            <div style={{fontFamily:ARA,fontSize:28,color:'#F5EFE3',direction:'rtl',lineHeight:1.8,marginBottom:10}}>الْمَأْثُورَاتُ</div>
            <div style={{fontSize:16,fontWeight:700,color:'#F5EFE3',marginBottom:4}}>Al-Ma'thurât Sughrâ</div>
            <div style={{fontSize:11,color:'rgba(201,168,76,.8)',marginBottom:18}}>{MATH.length} invocations · Matin & Soir</div>
            <button onClick={()=>setReading(true)} style={{padding:'12px 28px',background:C.gold,border:'none',borderRadius:10,color:'white',fontSize:14,fontWeight:700,cursor:'pointer',letterSpacing:.3}}>
              Commencer la lecture →
            </button>
          </div>

          {/* Preview list */}
          <div style={{fontSize:12,color:C.bl,marginBottom:10,fontWeight:600,letterSpacing:.5,textTransform:'uppercase'}}>Aperçu des invocations</div>
          {MATH.map((item,i)=>(
            <div key={item.n} onClick={()=>{setReading(true);}} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',background:C.bg2,border:`1px solid ${C.border}`,borderRadius:10,marginBottom:7,cursor:'pointer',transition:'background .12s'}}
              onMouseOver={e=>e.currentTarget.style.background='rgba(138,105,16,.06)'} onMouseOut={e=>e.currentTarget.style.background=C.bg2}>
              <div style={{width:28,height:28,flexShrink:0,clipPath:'polygon(29% 0%,71% 0%,100% 29%,100% 71%,71% 100%,29% 100%,0% 71%,0% 29%)',background:'#E4D9C4',color:C.bm,display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,fontWeight:700}}>{item.n}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:13,fontWeight:600,color:C.brown,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{item.cat}</div>
                {item.reps>1&&<div style={{fontSize:10,color:C.bl,marginTop:1}}>× {item.reps} fois</div>}
              </div>
              <div style={{fontFamily:ARA,fontSize:16,color:C.blue,direction:'rtl',flexShrink:0,maxWidth:80,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{item.ar.slice(0,12)}…</div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
};

/* ══════════════════════════════════════
   MAIN APP
══════════════════════════════════════ */
function AnwarApp(){
  const [tab,setTab]=useState('home');
  const [sbo,setSBO]=useState(false);
  const [sett,setSett]=useState(false);
  const [sbm,setSbm]=useState('s');
  const [sbq,setSbq]=useState('');
  const [infos,setInfos]=useState(null);
  const [taf,setTaf]=useState(null);
  const [tafLang,setTafLang]=useState('fr');
  const [wp,setWp]=useState(null);
  const [sn,setSn]=useState(1);
  const [ayahs,setAyahs]=useState([]);
  const [frV,setFrV]=useState([]);
  const [tjA,setTjA]=useState([]);
  const [loading,setLoading]=useState(false);
  const [allFr,setAllFr]=useState(null);
  const [allFrL,setAllFrL]=useState(false);
  const [rec,setRec]=useState('ar.alafasy');
  const [fs,setFs]=useState(28);
  const [spd,setSpd]=useState(1);
  const [showFr,setShowFr]=useState(true);
  const [tj,setTj]=useState(true);
  const [ao,setAO]=useState(false);
  const [pm,setPM]=useState(false);
  const [hz,setHz]=useState(false);
  const [vi,setVi]=useState(0);
  const [playing,setPlaying]=useState(false);
  const [repeat,setRepeat]=useState('none');
  const [prog,setProg]=useState(0);
  const [vd,setVD]=useState(new Set());
  const [rw,setRW]=useState(new Set());
  const [bk,setBk]=useState([]);
  const [dc,setDc]=useState([0,0,0,0]);
  const [toast,setToast]=useState('');
  const [toastT,setTT]=useState(null);
  const [sq,setSq]=useState('');
  const [sr,setSr]=useState(null);
  const aref=useRef(null);
  const vref=useRef({});

  useEffect(()=>{if(!document.getElementById('anwar-css')){const s=document.createElement('style');s.id='anwar-css';s.textContent=GCSS;document.head.appendChild(s);}},[]);

  const showToast=useCallback((msg)=>{setToast(msg);clearTimeout(toastT);setTT(setTimeout(()=>setToast(''),2600));},[toastT]);

  useEffect(()=>{
    const a=aref.current;if(!a)return;
    const onE=()=>{if(repeat==='verse'){a.play().catch(()=>{});return;}setVD(p=>new Set([...p,vi]));const nx=vi+1;if(nx<ayahs.length)playAt(nx);else if(repeat==='surah')playAt(0);else setPlaying(false);};
    const onTU=()=>{if(a.duration>0)setProg(a.currentTime/a.duration);};
    a.addEventListener('ended',onE);a.addEventListener('timeupdate',onTU);
    a.addEventListener('play',()=>setPlaying(true));a.addEventListener('pause',()=>setPlaying(false));
    return()=>{a.removeEventListener('ended',onE);a.removeEventListener('timeupdate',onTU);a.removeEventListener('play',()=>setPlaying(true));a.removeEventListener('pause',()=>setPlaying(false));};
  },[repeat,vi,ayahs.length]);

  const loadSurah=useCallback((n)=>{
    setLoading(true);setAyahs([]);setFrV([]);setTjA([]);setVi(0);setPlaying(false);setVD(new Set());setRW(new Set());
    if(aref.current)aref.current.src='';
    Promise.all([
      fetch(`https://api.alquran.cloud/v1/surah/${n}/editions/quran-tajweed,fr.hamidullah`).then(r=>r.json()).catch(()=>null),
      fetch(`https://api.alquran.cloud/v1/surah/${n}/quran-uthmani`).then(r=>r.json()).catch(()=>null),
    ]).then(([tjRes,utRes])=>{
      let main=[],fr=[],tj2=[];
      if(tjRes?.code===200&&Array.isArray(tjRes.data)&&tjRes.data.length>=2){const s=tjRes.data[0]?.ayahs[0]?.text||'';if(s.includes('<span'))tj2=tjRes.data[0].ayahs;fr=tjRes.data[1]?.ayahs||[];}
      main=utRes?.code===200?utRes.data?.ayahs||[]:tjRes?.data?.[0]?.ayahs?.map(a=>({...a,text:a.text.replace(/\[[^\]]*\]/g,'').replace(/\|/g,'').replace(/\s+/g,' ').trim()}))||[];
      setAyahs(main);setFrV(fr);setTjA(tj2);setLoading(false);
    });
    if(!allFr&&!allFrL){setAllFrL(true);fetch('https://api.alquran.cloud/v1/quran/fr.hamidullah').then(r=>r.json()).then(({code,data})=>{if(code===200&&data?.surahs){const all=[];data.surahs.forEach(s=>s.ayahs.forEach(a=>all.push({...a,surah:s.number})));setAllFr(all);}setAllFrL(false);}).catch(()=>setAllFrL(false));}
  },[allFr,allFrL]);

  const navTo=useCallback((n)=>{setSn(n);setSBO(false);setTab('quran');loadSurah(n);},[loadSurah]);
  useEffect(()=>{loadSurah(1);},[]);

  const aURL=(n,i)=>{const o=OFFSETS[n];if(!o)return null;return`https://cdn.islamic.network/quran/audio/128/${rec}/${o+i}.mp3`;};
  const playAt=useCallback((idx)=>{
    if(idx<0||idx>=ayahs.length)return;setVi(idx);
    const url=aURL(sn,idx);if(aref.current&&url){aref.current.src=url;aref.current.playbackRate=spd;aref.current.play().catch(()=>{});}
    setTimeout(()=>vref.current[idx]?.scrollIntoView({behavior:'smooth',block:'center'}),80);
  },[sn,ayahs.length,rec,spd]);

  const togglePlay=()=>{if(playing)aref.current?.pause();else{if(aref.current?.src)aref.current.play().catch(()=>{});else playAt(vi);}};

  const openTafsir=(idx)=>{setTafLang('fr');setTaf({idx,loading:true,text:null,lang:'fr'});};
  useEffect(()=>{
    if(!taf?.loading)return;
    if(taf.lang==='fr'){setTaf(p=>({...p,loading:false,text:'fr'}));return;}
    fetch(`https://api.alquran.cloud/v1/ayah/${sn}:${taf.idx+1}/editions/en.ibnkathir`).then(r=>r.json()).then(({code,data})=>{setTaf(p=>({...p,loading:false,text:code===200&&Array.isArray(data)?data[0]?.text:null}));}).catch(()=>setTaf(p=>({...p,loading:false,text:null})));
  },[taf?.loading,taf?.lang,sn]);

  const toggleBk=(n,idx)=>{const key=`${n}:${idx+1}`;const s=SD.find(x=>x[0]===n);const ex=bk.some(b=>b.key===key);if(ex){setBk(p=>p.filter(b=>b.key!==key));showToast('Signet retiré');}else{setBk(p=>[...p,{key,sn:n,vi:idx,en:s?.[1]||'',fr:s?.[2]||'',frPrev:(frV[idx]?.text||'').slice(0,100)}]);showToast('🔖 Signet ajouté');}};
  const doSearch=()=>{if(!sq.trim())return;const q2=sq.toLowerCase();const src=allFr||frV.map(v=>({...v,surah:sn}));setSr(src.filter(v=>v.text.toLowerCase().includes(q2)).slice(0,80));};

  const curS=SD.find(x=>x[0]===sn);
  const vdj=VDJ[new Date().getDate()%VDJ.length];
  const hasTj=tjA.length>0;

  const renderAra=(idx,fontSize,extra={})=>{
    const ay=ayahs[idx];if(!ay)return null;
    const tjAy=tjA[idx];const ac=idx===vi;
    if(hasTj&&tj&&tjAy?.text?.includes('<span'))return <div className="tw" dir="rtl" dangerouslySetInnerHTML={{__html:tjAy.text}} style={{fontFamily:ARA,fontSize,lineHeight:2.15,color:C.blue,textAlign:'right',...extra}}/>;
    return(<div dir="rtl" style={{fontFamily:ARA,fontSize,lineHeight:2.15,color:C.blue,textAlign:'right',...extra}}>
      {(ay.text||'').split(' ').filter(Boolean).map((w,i)=>{const hidden=hz&&!ac&&!rw.has(w);return<span key={i} className="vword" style={{filter:hidden?'blur(5px)':undefined}} onClick={e=>{e.stopPropagation();if(hz)setRW(p=>new Set([...p,w]));else setWp({word:w});}}>{w} </span>;})}
    </div>);
  };

  const renderPageMode=()=>(
    <div style={{padding:'20px 18px',background:'#FAF6EC',minHeight:'100%'}}>
      {sn!==9&&<div style={{textAlign:'center',fontFamily:ARA,fontSize:fs+6,color:C.blue,direction:'rtl',lineHeight:2.2,marginBottom:18,padding:14,borderTop:`2px solid ${C.gold}`,borderBottom:`2px solid ${C.gold}`}}>بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div>}
      <div dir="rtl" style={{fontFamily:ARA,fontSize:fs+4,color:C.blue,textAlign:'justify',lineHeight:2.6,wordSpacing:4}}>
        {ayahs.map((ay,idx)=>{const tjAy=tjA[idx];const numS=<span key={`n${idx}`} onClick={()=>playAt(idx)} style={{display:'inline-flex',alignItems:'center',justifyContent:'center',width:28,height:28,borderRadius:'50%',background:C.gold,color:'white',fontSize:10,fontWeight:700,fontFamily:UI,verticalAlign:'middle',margin:'0 4px',cursor:'pointer'}}>{ay.numberInSurah}</span>;if(hasTj&&tj&&tjAy?.text?.includes('<span'))return<span key={idx}><span className="tw" dangerouslySetInnerHTML={{__html:tjAy.text}}/>{numS}</span>;return<span key={idx}>{ay.text} {numS}</span>;})}
      </div>
      {!ao&&showFr&&frV.length>0&&<div style={{marginTop:28,borderTop:`2px solid ${C.border}`,paddingTop:18}}><div style={{fontSize:10,color:C.gold,letterSpacing:1.5,textTransform:'uppercase',marginBottom:12,textAlign:'center',fontWeight:700}}>Traduction — {curS?.[1]||''}</div>{frV.map((v,i)=><p key={i} style={{fontSize:14,color:C.bm,lineHeight:1.85,marginBottom:10,fontStyle:'italic'}}><span style={{fontSize:11,color:C.bl,fontWeight:700,marginRight:4}}>[{i+1}]</span>{v.text}</p>)}</div>}
      <div style={{padding:14,display:'flex',gap:10,justifyContent:'center'}}>
        <button onClick={()=>playAt(0)} style={{padding:'8px 18px',background:C.gold,border:'none',borderRadius:8,color:'white',fontSize:13,fontWeight:600,cursor:'pointer'}}>▶ Lire</button>
        <button onClick={()=>setPM(false)} style={{padding:'8px 14px',border:`1px solid ${C.border}`,borderRadius:8,background:'none',color:C.bm,fontSize:13,cursor:'pointer'}}>Mode cartes</button>
      </div>
    </div>
  );

  const renderCards=()=>(
    <div style={{padding:'8px 0'}}>
      {hz&&<div style={{margin:'8px 10px 2px',padding:'9px 13px',background:'#FFF8E8',border:`1px solid ${C.gb}`,borderRadius:8,fontSize:12,color:C.bm}}>🎓 Mode mémorisation — tapez sur un mot pour révéler</div>}
      {hasTj&&tj&&<div style={{margin:'6px 10px 2px',padding:'7px 12px',background:'#EFF6FF',border:'1px solid rgba(59,130,246,.2)',borderRadius:8,fontSize:11,color:'#1D4ED8'}}>🎨 Tajweed coloré actif</div>}
      {sn!==9&&<div style={{textAlign:'center',padding:16,fontFamily:ARA,fontSize:fs,color:C.blue,direction:'rtl',lineHeight:2}}>بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div>}
      {ayahs.map((ay,idx)=>{
        const fr=frV[idx];const ac=idx===vi;const bkd=bk.some(b=>b.key===`${sn}:${idx+1}`);const done=vd.has(idx);
        return(
          <div key={idx} ref={el=>vref.current[idx]=el} onClick={()=>playAt(idx)}
            style={{margin:'7px 10px',padding:'16px 15px',background:ac?'#FAF5E8':C.bg2,border:`1.5px solid ${ac?C.gold:C.border}`,borderLeft:`5px solid ${ac?C.gold:'transparent'}`,borderRadius:12,cursor:'pointer',animation:'fadeUp .2s',boxShadow:ac?`0 3px 16px ${C.gb}`:`0 1px 4px ${C.shadow}`,transition:'all .2s',position:'relative',fontFamily:UI}}>
            {done&&!ac&&<div style={{position:'absolute',top:10,right:12,fontSize:13,animation:'vcheck .3s',opacity:.45,color:C.green}}>✓</div>}
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:13}}>
              <div style={{width:32,height:32,flexShrink:0,clipPath:'polygon(29% 0%,71% 0%,100% 29%,100% 71%,71% 100%,29% 100%,0% 71%,0% 29%)',background:ac?C.gold:'#E4D9C4',color:ac?'white':C.bm,display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,fontWeight:700}}>{ay.numberInSurah}</div>
              <div style={{flex:1}}/>
              <Btn onClick={e=>{e.stopPropagation();openTafsir(idx);}} style={{border:`1px solid ${C.border}`,borderRadius:6,color:C.bm,padding:'4px 10px',fontSize:11,fontWeight:500}}>📚 Tafsir</Btn>
              <Btn onClick={e=>{e.stopPropagation();toggleBk(sn,idx);}} style={{fontSize:16,opacity:bkd?1:.25,color:C.gold}}>🔖</Btn>
              <Btn onClick={e=>{e.stopPropagation();playAt(idx);}} style={{width:30,height:30,borderRadius:'50%',background:ac&&playing?C.gold:C.gf,color:ac&&playing?'white':C.gold,display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,animation:ac&&playing?'pulse 1.5s infinite':'none'}}>{ac&&playing?'⏸':'▶'}</Btn>
            </div>
            {renderAra(idx,fs,{marginBottom:!ao&&showFr&&fr?13:0})}
            {!ao&&showFr&&fr&&<div style={{fontSize:14,color:C.bm,lineHeight:1.82,borderTop:`1px solid ${C.border}`,paddingTop:10,fontStyle:'italic'}}>{fr.text}</div>}
          </div>
        );
      })}
    </div>
  );

  return(
    <div style={{display:'flex',flexDirection:'column',height:'100vh',background:C.bg,fontFamily:UI,overflow:'hidden',position:'relative'}}>
      <audio ref={aref} onTimeUpdate={()=>{const e=aref.current;if(e?.duration>0)setProg(e.currentTime/e.duration);}}/>

      {toast&&<div style={{position:'absolute',bottom:150,left:'50%',transform:'translateX(-50%)',background:C.brown,color:'#FDF8EE',borderRadius:20,padding:'7px 18px',fontSize:13,zIndex:900,whiteSpace:'nowrap',animation:'fadeUp .3s'}}>{toast}</div>}

      {/* Sidebar */}
      {sbo&&<div onClick={()=>setSBO(false)} style={{position:'absolute',inset:0,background:'rgba(0,0,0,.28)',zIndex:50}}/>}
      <div style={{position:'absolute',top:0,left:0,height:'100%',width:285,background:C.side,borderRight:`1px solid ${C.border}`,display:'flex',flexDirection:'column',zIndex:60,transform:sbo?'translateX(0)':'translateX(-100%)',transition:'transform .26s ease',boxShadow:sbo?'4px 0 24px rgba(0,0,0,.1)':'none'}}>
        <div style={{padding:'14px 13px 10px',borderBottom:`1px solid ${C.border}`,flexShrink:0}}>
          <div style={{fontSize:16,fontWeight:700,color:C.brown,marginBottom:10}}>Liste des sourates</div>
          <div style={{display:'flex',background:'#E0D8C5',borderRadius:8,padding:3,marginBottom:8}}>
            <button onClick={()=>setSbm('s')} style={{flex:1,padding:6,border:'none',borderRadius:6,background:sbm==='s'?C.gold:'transparent',color:sbm==='s'?'white':C.bm,fontSize:11,fontWeight:600,cursor:'pointer'}}>Sourates</button>
            <button onClick={()=>setSbm('j')} style={{flex:1,padding:6,border:'none',borderRadius:6,background:sbm==='j'?C.gold:'transparent',color:sbm==='j'?'white':C.bm,fontSize:11,cursor:'pointer'}}>Juz</button>
          </div>
          {sbm==='s'&&<input placeholder="Rechercher…" value={sbq} onChange={e=>setSbq(e.target.value)} style={{width:'100%',padding:'8px 11px',background:C.bg2,border:`1px solid ${C.border}`,borderRadius:8,color:C.brown,fontSize:12,outline:'none'}}/>}
        </div>
        <div style={{display:'flex',padding:'6px 14px',background:'#EDE6D5',borderBottom:`1px solid ${C.bstr}`,flexShrink:0}}>
          <div style={{width:36,fontSize:9,color:C.bl,fontWeight:700,textTransform:'uppercase',textAlign:'center'}}>N°</div>
          <div style={{flex:1,padding:'0 10px',fontSize:9,color:C.bl,fontWeight:700,textTransform:'uppercase'}}>Sourate</div>
          <div style={{minWidth:65,fontSize:9,color:C.bl,fontWeight:700,textTransform:'uppercase',textAlign:'center'}}>Arabe</div>
        </div>
        <div style={{flex:1,overflowY:'auto'}}>{SD.filter(s=>!sbq||s[1].toLowerCase().includes(sbq.toLowerCase())||String(s[0]).startsWith(sbq)).map(s=><SurahRow key={s[0]} s={s} active={s[0]===sn} onClick={()=>navTo(s[0])}/>)}</div>
      </div>

      {/* Settings */}
      {sett&&<div onClick={()=>setSett(false)} style={{position:'absolute',inset:0,background:'rgba(0,0,0,.18)',zIndex:59}}/>}
      <div style={{position:'absolute',top:0,right:0,height:'100%',width:290,background:C.bg2,borderLeft:`1px solid ${C.border}`,zIndex:60,transform:sett?'translateX(0)':'translateX(100%)',transition:'transform .26s ease',display:'flex',flexDirection:'column'}}>
        <div style={{padding:'15px 14px',borderBottom:`1px solid ${C.border}`,display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0}}>
          <div style={{fontSize:16,fontWeight:700,color:C.brown}}>⚙️ Paramètres</div>
          <Btn onClick={()=>setSett(false)} style={{fontSize:18,color:C.bl}}>✕</Btn>
        </div>
        <div style={{padding:14,overflowY:'auto',flex:1}}>
          <div style={{fontSize:11,color:C.bl,letterSpacing:1,textTransform:'uppercase',marginBottom:8}}>Récitateur</div>
          {RECITERS.map(([id,name])=><button key={id} onClick={()=>setRec(id)} style={{display:'block',width:'100%',padding:'9px 12px',marginBottom:6,borderRadius:9,border:`1.5px solid ${rec===id?C.gold:C.border}`,background:rec===id?C.gf:'none',textAlign:'left',fontSize:12,color:C.brown,cursor:'pointer'}}>{name}</button>)}
          <div style={{fontSize:11,color:C.bl,letterSpacing:1,textTransform:'uppercase',marginBottom:5,marginTop:14}}>Taille texte · {fs}px</div>
          <input type="range" min="22" max="46" value={fs} step="1" onChange={e=>setFs(+e.target.value)} style={{width:'100%',accentColor:C.gold,marginBottom:14}}/>
          <div style={{fontSize:11,color:C.bl,letterSpacing:1,textTransform:'uppercase',marginBottom:6}}>Vitesse</div>
          <div style={{display:'flex',gap:5,marginBottom:14}}>{[0.75,1,1.25,1.5].map(v=><button key={v} onClick={()=>{setSpd(v);if(aref.current)aref.current.playbackRate=v;}} style={{flex:1,padding:'6px 0',border:`1px solid ${spd===v?C.gold:C.border}`,borderRadius:6,background:spd===v?C.gf:'none',fontSize:11,color:spd===v?C.gold:C.bm,cursor:'pointer'}}>{v}×</button>)}</div>
          {[['Traduction française',showFr,setShowFr],['Couleurs Tajweed',tj,setTj],['Arabe uniquement',ao,(v)=>{setAO(v);if(v)setPM(true);}],['Mode page authentique',pm,setPM],['Mode mémorisation (Hifz)',hz,setHz]].map(([l,val,set])=>(
            <div key={l} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 0',borderBottom:`1px solid ${C.border}`}}>
              <div style={{flex:1,fontSize:13,color:C.brown}}>{l}</div><Toggle on={val} onToggle={()=>set(!val)}/>
            </div>
          ))}
          <div style={{fontSize:11,color:C.bl,letterSpacing:1,textTransform:'uppercase',margin:'14px 0 8px'}}>Légende Tajweed</div>
          {LEGEND.map(l=><div key={l.l} style={{display:'flex',alignItems:'center',gap:8,marginBottom:7}}><span style={{width:12,height:12,borderRadius:'50%',background:l.c,display:'inline-block',flexShrink:0}}/><span style={{fontSize:11,color:C.bm}}>{l.l}</span></div>)}
        </div>
      </div>

      {/* Surah info modal */}
      {infos&&(
        <div onClick={()=>setInfos(null)} style={{position:'absolute',inset:0,background:'rgba(0,0,0,.38)',zIndex:200,display:'flex',alignItems:'flex-end'}}>
          <div onClick={e=>e.stopPropagation()} style={{background:C.bg2,borderRadius:'20px 20px 0 0',width:'100%',animation:'slideUpM .25s ease',overflow:'hidden',maxHeight:'88%',display:'flex',flexDirection:'column'}}>
            <div style={{height:4,background:C.gold,width:50,borderRadius:2,margin:'14px auto 0',flexShrink:0}}/>
            <div style={{padding:'18px 20px 22px',overflowY:'auto'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:14}}>
                <div><div style={{fontSize:22,fontWeight:700,color:C.brown}}>{infos[1]}</div><div style={{fontSize:14,color:C.bm,marginTop:3}}>{infos[2]}</div></div>
                <div style={{fontFamily:ARA,fontSize:36,color:C.blue,direction:'rtl'}}>{infos[5]}</div>
              </div>
              <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:14}}>
                <span style={{padding:'4px 11px',borderRadius:20,fontSize:11,background:C.gf,border:`1px solid ${C.gb}`,color:C.gold,fontWeight:600}}>{infos[4]==='M'?'🕋 Mecquoise':'🕌 Médinoise'}</span>
                <span style={{padding:'4px 11px',borderRadius:20,fontSize:11,background:C.gf,border:`1px solid ${C.border}`,color:C.bm}}>{infos[3]} versets</span>
              </div>
              {infos[0]!==9&&<div style={{fontFamily:ARA,fontSize:22,color:C.blue,textAlign:'center',direction:'rtl',padding:14,background:'#F8F3E8',borderRadius:10,marginBottom:14,lineHeight:2,border:`1px solid ${C.border}`}}>بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div>}
              <div style={{fontSize:13,color:C.bm,lineHeight:1.8,marginBottom:18}}>{SURAH_DESC[infos[0]]||`Sourate ${infos[1]} (${infos[2]}) — ${infos[4]==='M'?'Mecquoise':'Médinoise'}, ${infos[3]} versets.`}</div>
              <button onClick={()=>{setInfos(null);navTo(infos[0]);}} style={{width:'100%',padding:14,background:C.gold,border:'none',borderRadius:12,color:'white',fontSize:15,fontWeight:600,cursor:'pointer',marginBottom:8}}>Commencer la lecture →</button>
              <button onClick={()=>setInfos(null)} style={{width:'100%',padding:10,background:'none',border:'none',color:C.bl,fontSize:13,cursor:'pointer'}}>Annuler</button>
            </div>
          </div>
        </div>
      )}

      {/* Tafsir modal */}
      {taf&&(
        <div onClick={()=>setTaf(null)} style={{position:'absolute',inset:0,background:'rgba(0,0,0,.38)',zIndex:200,display:'flex',alignItems:'flex-end'}}>
          <div onClick={e=>e.stopPropagation()} style={{background:C.bg2,borderRadius:'20px 20px 0 0',width:'100%',maxHeight:'80%',display:'flex',flexDirection:'column',overflow:'hidden',animation:'slideUpM .25s ease'}}>
            <div style={{padding:'14px 16px',borderBottom:`1px solid ${C.border}`,display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0}}>
              <div><div style={{fontSize:15,fontWeight:700,color:C.brown}}>Tafsir Ibn Kathir</div><div style={{fontSize:11,color:C.bl,marginTop:2}}>{curS?.[1]} · Verset {taf.idx+1}</div></div>
              <div style={{display:'flex',gap:8,alignItems:'center'}}>
                <button onClick={()=>{const nl=tafLang==='fr'?'en':'fr';setTafLang(nl);setTaf(p=>({...p,loading:true,lang:nl,text:null}));}} style={{padding:'4px 10px',border:`1px solid ${C.border}`,borderRadius:6,background:C.gf,fontSize:11,color:C.gold,fontWeight:600,cursor:'pointer'}}>{tafLang==='fr'?'🇫🇷 Français':'🇬🇧 English'}</button>
                <Btn onClick={()=>setTaf(null)} style={{fontSize:20,color:C.bl}}>✕</Btn>
              </div>
            </div>
            {ayahs[taf.idx]&&<div dir="rtl" style={{padding:'12px 16px',fontFamily:ARA,fontSize:22,color:C.blue,textAlign:'right',lineHeight:1.9,background:'#F8F3E8',borderBottom:`1px solid ${C.border}`,flexShrink:0}}>{ayahs[taf.idx].text}</div>}
            {frV[taf.idx]&&<div style={{padding:'10px 16px',fontSize:13,color:C.bm,fontStyle:'italic',lineHeight:1.7,borderBottom:`1px solid ${C.border}`,flexShrink:0}}>{frV[taf.idx].text}</div>}
            <div style={{padding:'14px 16px',overflowY:'auto',flex:1,fontSize:13.5,lineHeight:1.9,color:C.brown}}>
              {taf.loading?<div style={{textAlign:'center',padding:24}}><div style={{width:24,height:24,border:`2px solid ${C.border}`,borderTop:`2px solid ${C.gold}`,borderRadius:'50%',animation:'spin 1s linear infinite',margin:'0 auto 10px'}}/></div>
              :taf.lang==='fr'?<div><div style={{background:'#FFFBEE',border:`1px solid ${C.border}`,borderRadius:8,padding:14,marginBottom:14}}><div style={{fontSize:12,fontWeight:700,color:C.brown,marginBottom:8}}>📗 Tafsir Ibn Kathir — Français</div><div style={{fontSize:12,color:C.bm,lineHeight:1.8,marginBottom:12}}>Le Tafsir complet en français est disponible sur <strong>tafsir.be</strong>.</div><a href={`https://tafsir.be/quran/${sn}/${taf.idx+1}`} target="_blank" rel="noreferrer" style={{display:'inline-block',padding:'10px 20px',background:C.blue,color:'white',borderRadius:8,fontSize:13,fontWeight:600,textDecoration:'none'}}>Lire sur tafsir.be →</a></div></div>
              :taf.text?<div>{taf.text}</div>
              :<div style={{textAlign:'center',padding:32,color:C.bl}}>Non disponible pour ce verset.</div>}
            </div>
          </div>
        </div>
      )}

      {wp&&<div onClick={()=>setWp(null)} style={{position:'absolute',inset:0,zIndex:180}}><div onClick={e=>e.stopPropagation()} style={{position:'absolute',bottom:150,left:'50%',transform:'translateX(-50%)',background:C.bg2,border:`1.5px solid ${C.gold}`,borderRadius:14,padding:'16px 22px',minWidth:220,boxShadow:`0 8px 32px ${C.shadow}`,textAlign:'center',animation:'fadeUp .2s ease'}}><div style={{fontFamily:ARA,fontSize:28,color:C.blue,direction:'rtl',marginBottom:5}}>{wp.word}</div><div style={{fontSize:12,color:C.bm,fontStyle:'italic',marginBottom:12}}>Analyse disponible dans l'app complète</div><button onClick={()=>setWp(null)} style={{background:C.gold,border:'none',borderRadius:8,color:'white',padding:'6px 20px',fontSize:12,fontWeight:600,cursor:'pointer'}}>Fermer</button></div></div>}

      {/* Header */}
      <header style={{background:C.bg2,borderBottom:`1px solid ${C.border}`,padding:'10px 13px',display:'flex',alignItems:'center',gap:10,flexShrink:0,boxShadow:`0 1px 6px ${C.shadow}`}}>
        <Btn onClick={()=>setSBO(v=>!v)} style={{border:`1px solid ${C.border}`,borderRadius:8,padding:'7px 10px',fontSize:14,color:C.bm}}>☰</Btn>
        <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',gap:10}}>
          <AnwarLogo size={38}/>
          <div>
            {tab==='quran'&&ayahs.length?<><div style={{fontSize:16,fontWeight:700,color:C.brown}}>{curS?.[1]} <span style={{fontWeight:400,fontSize:13,color:C.bl}}>({curS?.[2]})</span></div><div style={{fontSize:10,color:C.bl,letterSpacing:1,textTransform:'uppercase',marginTop:1}}>{curS?.[4]==='M'?'Mecquoise 🕋':'Médinoise 🕌'} · {curS?.[3]}v</div></>
            :<><div style={{fontSize:16,fontWeight:700,color:C.blue}}>Anwar App</div><div style={{fontSize:10,color:C.bl,letterSpacing:1.2,textTransform:'uppercase',marginTop:1}}>Al-Qurʾân · Lecture & Méditation</div></>}
          </div>
        </div>
        <Btn onClick={()=>setSett(v=>!v)} style={{border:`1px solid ${C.border}`,borderRadius:8,padding:'7px 8px',fontSize:13}}>⚙️</Btn>
      </header>

      {/* Content */}
      <div style={{flex:1,overflowY:'auto',paddingBottom:tab==='quran'?196:136,display:'flex',flexDirection:'column'}}>
        {tab==='home'&&(
          <div style={{padding:'14px 14px 16px'}}>
            <div style={{background:'linear-gradient(135deg,#2A1F0A,#1B2D5A)',borderRadius:16,padding:'16px 18px',marginBottom:12,position:'relative',overflow:'hidden'}}>
              <div style={{position:'absolute',inset:0,opacity:.05,backgroundImage:'repeating-linear-gradient(60deg,#c9a84c 0,#c9a84c 1px,transparent 0,transparent 20px)',backgroundSize:'20px 20px'}}/>
              <div style={{fontSize:21,fontWeight:700,color:'#F5EFE3',marginBottom:2}}>Anwar App</div>
              <div style={{fontSize:10,color:'rgba(201,168,76,.8)'}}>{new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</div>
            </div>
            <div style={{background:C.bg2,border:`1.5px solid ${C.gb}`,borderLeft:`4px solid ${C.gold}`,borderRadius:14,padding:16,marginBottom:12}}>
              <div style={{fontSize:10,color:C.gold,letterSpacing:1.5,textTransform:'uppercase',fontWeight:700,marginBottom:10}}>✨ Verset du jour</div>
              <div style={{fontFamily:ARA,fontSize:26,color:C.blue,direction:'rtl',textAlign:'right',lineHeight:2,marginBottom:10}}>{vdj.ar}</div>
              <div style={{fontSize:14,color:C.bm,fontStyle:'italic',lineHeight:1.75,marginBottom:7}}>« {vdj.fr} »</div>
              <div style={{fontSize:11,color:C.bl}}>{vdj.ref}</div>
            </div>
            <div style={{fontSize:14,fontWeight:700,color:C.brown,marginBottom:8}}>Les 114 Sourates</div>
            <div style={{background:C.bg2,border:`1px solid ${C.border}`,borderRadius:12,overflow:'hidden'}}>
              <div style={{display:'flex',padding:'6px 14px',background:'#EDE6D5',borderBottom:`1.5px solid ${C.bstr}`}}>
                <div style={{width:36,fontSize:9,color:C.bl,fontWeight:700,textTransform:'uppercase',textAlign:'center'}}>N°</div>
                <div style={{flex:1,padding:'0 10px',fontSize:9,color:C.bl,fontWeight:700,textTransform:'uppercase'}}>Sourate · Traduction</div>
                <div style={{minWidth:65,fontSize:9,color:C.bl,fontWeight:700,textTransform:'uppercase',textAlign:'center'}}>Arabe</div>
              </div>
              {SD.map(s=><SurahRow key={s[0]} s={s} active={s[0]===sn} onClick={()=>setInfos(s)}/>)}
            </div>
          </div>
        )}

        {tab==='quran'&&(loading?<Spinner text="Chargement de la sourate…"/>:!ayahs.length?<div style={{textAlign:'center',padding:50}}><div style={{fontSize:15,fontWeight:600,color:C.brown,marginBottom:8}}>Choisissez une sourate</div><button onClick={()=>setTab('home')} style={{padding:'12px 24px',background:C.gold,border:'none',borderRadius:10,color:'white',fontSize:14,fontWeight:600,cursor:'pointer'}}>Voir les sourates →</button></div>:(pm||ao)?renderPageMode():renderCards())}

        {tab==='search'&&(
          <div style={{padding:14}}>
            <div style={{fontSize:13,color:C.bl,marginBottom:10}}>{allFr?'Recherche dans les 6 236 versets':'Chargement en arrière-plan…'}</div>
            <div style={{display:'flex',gap:8,marginBottom:14}}>
              <input value={sq} onChange={e=>setSq(e.target.value)} onKeyDown={e=>e.key==='Enter'&&doSearch()} placeholder="Ex: miséricordieux, paradis…" style={{flex:1,padding:'11px 13px',background:C.bg2,border:`1.5px solid ${C.border}`,borderRadius:10,color:C.brown,fontSize:13,outline:'none'}}/>
              <button onClick={doSearch} style={{padding:'11px 18px',background:C.gold,border:'none',borderRadius:10,color:'white',fontSize:14,fontWeight:700,cursor:'pointer'}}>→</button>
            </div>
            {sr!==null&&(<><div style={{fontSize:12,color:C.bl,marginBottom:10}}>{sr.length} résultat(s){allFr?' dans tout le Coran':''}</div>
            {sr.length===0?<div style={{textAlign:'center',padding:24,color:C.bl}}>Aucun résultat</div>
            :sr.map(v=>{const s=SD.find(x=>x[0]===v.surah);return(<div key={`${v.surah}:${v.numberInSurah}`} onClick={()=>{navTo(v.surah);setTimeout(()=>playAt(v.numberInSurah-1),600);}} style={{padding:'11px 13px',marginBottom:7,background:C.bg2,border:`1px solid ${C.border}`,borderRadius:10,cursor:'pointer'}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:5}}><div style={{fontSize:11,color:C.gold,fontWeight:700}}>{s?.[1]||''} — V.{v.numberInSurah}</div><div style={{fontFamily:ARA,fontSize:14,color:C.blue,direction:'rtl'}}>{s?.[5]||''}</div></div>
              <div style={{fontSize:13,color:C.bm,lineHeight:1.75,fontStyle:'italic'}} dangerouslySetInnerHTML={{__html:v.text.replace(new RegExp(sq,'gi'),m=>`<mark style="background:#FFF3C4;color:${C.gold};">${m}</mark>`)}}/>
            </div>);})}</>)}
          </div>
        )}

        {tab==='dhikr'&&<DhikrTab dc={dc} setDc={setDc}/>}

        {tab==='bk'&&(
          <div style={{padding:12}}>
            {!bk.length?<div style={{textAlign:'center',padding:72}}><div style={{fontSize:50,marginBottom:14}}>🔖</div><div style={{fontSize:18,color:C.brown,fontWeight:700,marginBottom:8}}>Aucun signet</div><div style={{fontSize:14,color:C.bl}}>Appuyez sur 🔖 dans un verset</div></div>
            :bk.map(b=>(<div key={b.key} onClick={()=>navTo(b.sn)} style={{padding:14,marginBottom:9,background:C.bg2,border:`1.5px solid ${C.border}`,borderLeft:`4px solid ${C.gold}`,borderRadius:12,cursor:'pointer'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}><div><div style={{fontSize:13,fontWeight:700,color:C.gold}}>{b.en} — Verset {b.vi+1}</div><div style={{fontSize:11,color:C.bl,marginTop:2}}>{b.fr}</div></div>
              <button onClick={e=>{e.stopPropagation();setBk(p=>p.filter(x=>x.key!==b.key));}} style={{border:'1px solid #FECACA',borderRadius:6,color:'#DC2626',padding:'3px 9px',fontSize:11,background:'none',cursor:'pointer'}}>Retirer</button></div>
              <div style={{fontSize:13,color:C.bl,fontStyle:'italic',lineHeight:1.65}}>{b.frPrev}…</div>
            </div>))}
          </div>
        )}
      </div>

      {/* Audio player */}
      {tab==='quran'&&ayahs.length>0&&(
        <div style={{background:C.bg2,borderTop:`1.5px solid ${C.border}`,flexShrink:0,boxShadow:`0 -2px 16px ${C.shadow}`}}>
          <div style={{height:3,background:C.border,cursor:'pointer'}} onClick={e=>{const r=e.currentTarget.getBoundingClientRect();const p=(e.clientX-r.left)/r.width;if(aref.current?.duration)aref.current.currentTime=p*aref.current.duration;}}>
            <div style={{height:'100%',background:C.gold,width:`${prog*100}%`,transition:'width .35s linear',borderRadius:'0 2px 2px 0'}}/>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:10,padding:'8px 14px'}}>
            <div style={{display:'flex',alignItems:'center',gap:2,height:22,flexShrink:0}}>{[5,9,4,12].map((h,i)=><div key={i} style={{width:3,height:h,borderRadius:2,background:C.gold,opacity:.4,animation:playing?`bar${i+1} .5s ease ${i*.1}s infinite`:'none'}}/>)}</div>
            <div style={{flex:1,minWidth:0}}><div style={{fontSize:13,fontWeight:700,color:C.brown,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{curS?.[1]} — {curS?.[2]}</div><div style={{fontSize:10,color:C.bl,marginTop:1}}>Verset {vi+1} sur {ayahs.length}</div></div>
            <Btn onClick={()=>playAt(vi-1)} disabled={vi===0} style={{fontSize:20,color:C.brown}}>⏮</Btn>
            <button onClick={togglePlay} style={{width:42,height:42,borderRadius:'50%',background:C.gold,border:'none',color:'white',fontSize:17,display:'flex',alignItems:'center',justifyContent:'center',boxShadow:`0 2px 12px ${C.gb}`,cursor:'pointer',animation:playing?'pulse 1.5s ease infinite':'none'}}>{playing?'⏸':'▶'}</button>
            <Btn onClick={()=>playAt(vi+1)} disabled={vi>=ayahs.length-1} style={{fontSize:20,color:C.brown}}>⏭</Btn>
            <Btn onClick={()=>setRepeat(r=>r==='none'?'verse':r==='verse'?'surah':'none')} style={{fontSize:15,color:C.bm,opacity:repeat==='none'?.3:1}}>{repeat==='verse'?'🔂':'🔁'}</Btn>
          </div>
        </div>
      )}

      {/* Bottom nav */}
      <nav style={{display:'flex',background:C.bg2,borderTop:`1.5px solid ${C.border}`,height:136,flexShrink:0,boxShadow:`0 -2px 12px ${C.shadow}`}}>
        {[['home','🏠','Accueil'],['quran','📖','Lire'],['search','🔍','Chercher'],['dhikr','📿','Dhikr'],['bk','🔖','Signets']].map(([id,icon,label])=>(
          <button key={id} onClick={()=>setTab(id)} className={`tab-btn ${tab===id?'active':'inactive'}`}>
            <span style={{fontSize:32,lineHeight:1}}>{icon}</span>
            <span style={{fontSize:13,fontWeight:600}}>{label}{id==='bk'&&bk.length>0?` (${bk.length})`:''}</span>
          </button>
        ))}
      </nav>
    </div>
  );
}

const container = document.getElementById('root');
const reactRoot = ReactDOM.createRoot(container);
reactRoot.render(React.createElement(AnwarApp));
requestAnimationFrame(() => { const f=document.getElementById('spf'); if(f)f.style.width='100%'; });
setTimeout(() => { const l=document.getElementById('loader'); if(l){l.classList.add('out');setTimeout(()=>l.remove(),600);} }, 2200);
</script>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(()=>{}));
}
</script>
</body>
</html>
